<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F6B45"/>
      <stop offset="1" stop-color="#0B3D2E"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- shoulders / lab coat -->
  <path d="M80 360c0-70 54-110 120-110s120 40 120 110" fill="#F8FAF6"/>
  <path d="M80 360c0-70 54-110 120-110s120 40 120 110" fill="none" stroke="#BFE3D0" stroke-width="4" opacity="0.5"/>

  <!-- coat lapels -->
  <path d="M170 258 L200 320 L185 258 Z" fill="#EAF6EE"/>
  <path d="M230 258 L200 320 L215 258 Z" fill="#EAF6EE"/>

  <!-- neck -->
  <rect x="185" y="215" width="30" height="45" rx="10" fill="#E7C9A9"/>

  <!-- head -->
  <circle cx="200" cy="175" r="62" fill="#EFCFAE"/>

  <!-- hair (simple bob with side part, headscarf-free, culturally neutral) -->
  <path d="M138 165c0-45 28-78 62-78s62 33 62 78c0 12-3 22-3 22s-10-40-59-40-59 40-59 40-3-10-3-22z" fill="#2A2118"/>
  <path d="M141 168c-4 30 2 55 14 70-10-3-24-18-24-46 0-10 4-18 10-24z" fill="#2A2118"/>
  <path d="M259 168c4 30-2 55-14 70 10-3 24-18 24-46 0-10-4-18-10-24z" fill="#2A2118"/>

  <!-- simple face -->
  <circle cx="180" cy="178" r="4.5" fill="#3A2E22"/>
  <circle cx="220" cy="178" r="4.5" fill="#3A2E22"/>
  <path d="M186 200q14 10 28 0" stroke="#B5714A" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- stethoscope -->
  <path d="M160 268c0 34 18 54 40 54s40-20 40-54" fill="none" stroke="#D9A441" stroke-width="7" stroke-linecap="round"/>
  <circle cx="200" cy="326" r="12" fill="#D9A441"/>
  <circle cx="160" cy="266" r="7" fill="#D9A441"/>
  <circle cx="240" cy="266" r="7" fill="#D9A441"/>

  <!-- decorative ring, matches the site's other doctor badges -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#D9A441" stroke-width="3" opacity="0.55"/>
</svg>
